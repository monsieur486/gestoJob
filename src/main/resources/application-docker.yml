spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: gestojob-webclient

  datasource:
    url: jdbc:postgresql://gestojob-db:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  liquibase:
    change-log: classpath:db/changelog/master.xml

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${DOCKER_UI_PORT}
  # L'application tourne derrière un reverse proxy qui termine le HTTPS
  # (https://nomdedomaine.ext). On fait confiance aux en-têtes X-Forwarded-*
  # pour générer des URL/redirections en https et reconnaître le schéma réel.
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: lax

gestojob:
  max-entreprises-par-page: ${MAX_ENTREPRISES_PAR_PAGE}
  max-annonces-par-page: ${MAX_ANNONCESS_PAR_PAGE}
  max-positifs-par-page: ${MAX_POSITIFS_PAR_PAGE}
  admin:
    username: ${GESTOJOB_ADMIN_USERNAME}
    password: ${GESTOJOB_ADMIN_PASSWORD}