<!DOCTYPE HTML>
<html lang="fr"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GestoJob</title>
    <div th:replace="~{fragments/header :: header-css}"></div>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>
<div class="container-fluid">
    <div class="alert alert-danger" id="error" th:if="${errorMessage != null}">
        <div th:text="${errorMessage}">Erreur</div>
    </div>

    <div class="text-muted" th:if="${#lists.isEmpty(annoncesEnAttenteEnvoiEmail)}">
        Aucune annonce en attente d'envoi.
    </div>

    <div th:if="${!#lists.isEmpty(annoncesEnAttenteEnvoiEmail)}">

        <div class="row g-2 fw-bold border-bottom pb-2 mb-2">
            <div class="col-12 col-md-1">🗓️ Date</div>
            <div class="col-12 col-md-1">Type</div>
            <div class="col-12 col-md-3">Infos</div>
            <div class="col-12 col-md-4">Libellé</div>
            <div class="col-12 col-md-1">Statut</div>
        </div>

        <div class="row g-2 align-items-center py-2 border-bottom"
             th:each="a : ${annoncesEnAttenteEnvoiEmail}">
            <div class="col-12 col-md-1" th:text="${a.dateEnvoi}">--</div>
            <div class="col-12 col-md-1" th:text="${a.type}">TYPE</div>
            <div class="col-12 col-md-3" th:text="${a.info}">Info</div>
            <div class="col-12 col-md-4" th:text="${a.libelle}">Libellé</div>
            <div class="col-12 col-md-1" th:text="${a.status}">Statut</div>
            <div class="col-12 col-md-2">
                <div class="d-flex gap-2 justify-content-md-end">
                    <form method="post" th:action="@{/file/postMail/{id}(id=${a.id})}">
                        <button class="btn btn-primary" type="submit">
                            ⌯⌲ Manuel
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <form method="post" th:action="@{/file/postMail}">
                <button class="btn btn-primary" type="submit">
                    ⌯⌲ Traiter la file d'attente
                </button>
            </form>
        </div>

        <nav aria-label="Pagination file d'attente" class="mt-3" th:if="${totalPages > 1}">
            <ul class="pagination">

                <!-- Précédent -->
                <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled' : ''">
                    <a aria-label="Précédent"
                       class="page-link"
                       th:href="@{/file(page=${currentPage - 1})}">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <!-- Pages cliquables -->
                <li class="page-item"
                    th:classappend="${p == currentPage} ? ' active' : ''"
                    th:each="p : ${#numbers.sequence(1, totalPages)}">
                    <a class="page-link" th:href="@{/file(page=${p})}" th:text="${p}">1</a>
                </li>

                <!-- Suivant -->
                <li class="page-item" th:classappend="${currentPage >= totalPages} ? ' disabled' : ''">
                    <a aria-label="Suivant"
                       class="page-link"
                       th:href="@{/file(page=${currentPage + 1})}">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>

            </ul>
        </nav>

    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"
        integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ"
        crossorigin="anonymous"></script>
<script src="" th:src="@{/js/main.js}" type="text/javascript"></script>
</body>
</html>
