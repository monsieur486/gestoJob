<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<div th:fragment="menu">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="/" style="margin-left: 13px;">🧑🏻‍💻💼🔎 GestoJob</a>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/"
                       th:classappend="${page_active == 'home'} ? ' active' : ''"
                    >🏠︎ Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/entreprises"
                       th:classappend="${page_active == 'entreprises'} ? ' active' : ''"
                    >🏢 Entreprises</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/file"
                       th:classappend="${page_active == 'file'} ? ' active' : ''"
                    >📤 File d'attente</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/annonces"
                       th:classappend="${page_active == 'annonces'} ? ' active' : ''"
                    >📝 Annonces</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/parametres"
                       th:classappend="${page_active == 'parametres'} ? ' active' : ''"
                    >⚙️ Paramètres</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto" style="margin-right: 13px;">
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}">🔑 Connexion</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form method="post" th:action="@{/logout}" class="d-inline">
                        <button class="btn btn-link nav-link" type="submit">🚪 Déconnexion</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>
</div>
</html>
