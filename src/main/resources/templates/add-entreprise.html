<!DOCTYPE HTML>
<html lang="fr"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GestoJob - Ajouter une entreprise</title>
    <div th:replace="~{fragments/header :: header-css}"></div>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>

<div class="container-fluid">
    <div class="alert alert-danger" id="error" th:if="${errorMessage != null}">
        <div th:text="${errorMessage}">Erreur</div>
    </div>

    <div class="d-flex justify-content-between align-items-center">
        <h3 class="mb-0">Ajouter une entreprise</h3>
        <a class="btn btn-sm btn-outline-secondary" th:href="@{/entreprises}">
            Retour à la liste
        </a>
    </div>

    <form class="mt-3" method="post" th:action="@{/entreprises/ajout}" th:object="${form}">
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label" for="nom">Nom</label>
                <input class="form-control" id="nom" required th:field="*{nom}" type="text"/>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label" for="adresse1">Adresse 1</label>
                <input class="form-control" id="adresse1" th:field="*{adresse1}" type="text"/>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label" for="adresse2">Adresse 2</label>
                <input class="form-control" id="adresse2" th:field="*{adresse2}" type="text"/>
            </div>
            <div class="col-12 col-md-2">
                <label class="form-label" for="codePostal">Code postal</label>
                <input class="form-control" id="codePostal" th:field="*{codePostal}" type="text"/>
            </div>
            <div class="col-12 col-md-4">
                <label class="form-label" for="ville">Ville</label>
                <input class="form-control" id="ville" th:field="*{ville}" type="text"/>
            </div>
            <div class="col-12 d-flex gap-2 mt-2">
                <button class="btn btn-primary" type="submit">
                    💾 Enregistrer
                </button>
                <a class="btn btn-outline-secondary" th:href="@{/entreprises}">
                    Annuler
                </a>
            </div>
        </div>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="" th:src="@{/js/main.js}" type="text/javascript"></script>
</body>
</html>
