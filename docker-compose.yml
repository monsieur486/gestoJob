services:

  gestojob-db:
    image: postgres:16
    container_name: gestojob-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Base accessible uniquement en local (dev + conteneurs) — jamais exposée publiquement.
      - "127.0.0.1:5432:5432"
    volumes:
      - gestojob_db_data:/var/lib/postgresql/data

  gestojob-webclient:
    env_file:
      - .env
    build:
      dockerfile: Dockerfile
    profiles: [ "fullstack" ]
    container_name: gestojob-webclient
    depends_on:
      - gestojob-db
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      # Exposé uniquement sur la loopback : seul le reverse proxy de l'hôte y accède
      # (indispensable puisqu'on fait confiance aux en-têtes X-Forwarded-*).
      # Si le proxy tourne sur une AUTRE machine, remplacer par "${DOCKER_UI_PORT}:${DOCKER_UI_PORT}".
      - "127.0.0.1:${DOCKER_UI_PORT}:${DOCKER_UI_PORT}"

volumes:
  gestojob_db_data:
