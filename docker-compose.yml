services:

  gestojob-db:
    image: postgres:16
    container_name: gestojob-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Aucun port publié sur l'hôte : la base n'est jointe qu'en interne
    # (gestojob-db:5432) par l'app conteneurisée → aucun conflit avec un
    # postgres déjà présent sur le serveur. Le port n'est exposé qu'en dev
    # (cf. docker-compose.dev.yml).
    volumes:
      - gestojob_db_data:/var/lib/postgresql/data

  gestojob-webclient:
    env_file:
      - .env
    build:
      dockerfile: Dockerfile
    profiles: [ "fullstack" ]
    container_name: gestojob-webclient
    depends_on:
      - gestojob-db
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      # Exposé uniquement sur la loopback : seul le reverse proxy de l'hôte y accède
      # (indispensable puisqu'on fait confiance aux en-têtes X-Forwarded-*).
      # Si le proxy tourne sur une AUTRE machine, remplacer par "${DOCKER_UI_PORT}:${DOCKER_UI_PORT}".
      - "127.0.0.1:${DOCKER_UI_PORT}:${DOCKER_UI_PORT}"

volumes:
  gestojob_db_data:
